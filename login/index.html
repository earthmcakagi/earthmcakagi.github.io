<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン・新規登録サイト</title>
    <!-- reCAPTCHA v2 APIの読み込み -->
    <script src="https://google.com" async defer></script>
    <style>
        .container { max-width: 350px; margin: 40px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; font-family: sans-serif; box-sizing: border-box; }
        .hidden { display: none !important; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; margin-bottom: 4px; font-weight: bold; }
        .input-group input { width: 100%; padding: 8px; box-sizing: border-box; }
        .captcha-group { margin: 15px 0; display: flex; justify-content: center; }
        .btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; margin-bottom: 10px; box-sizing: border-box; }
        .primary-btn { background: #007bff; color: white; }
        .secondary-btn { background: #e2e3e5; color: #383d41; }
        .danger-btn { background: #dc3545; color: white; }
        .error { color: red; font-size: 14px; margin-top: 10px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <!-- 1. ログイン/新規登録の統合フォーム -->
    <div id="authSection" class="container">
        <h2 id="formTitle" style="text-align: center; margin-top: 0;">ログイン</h2>
        
        <div class="input-group" id="emailGroup">
            <label>メールアドレス</label>
            <input type="email" id="email" placeholder="example@gmail.com">
        </div>
        
        <div class="input-group" id="passwordGroup">
            <label>パスワード</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        
        <div class="input-group hidden" id="codeGroup">
            <label>確認コード（メールをご確認ください）</label>
            <input type="text" id="verifyCode" placeholder="6桁の数字">
        </div>

        <div class="captcha-group hidden" id="captchaContainer">
            <!-- あなたのサイトキーを設定済み -->
            <div class="g-recaptcha" data-sitekey="6Le7Cl4tAAAAABFdmoBnlM5doq_6TPkzDim6lYJI"></div>
        </div>

        <!-- アクションボタン（クリックを100%発生させるため独立配置） -->
        <button type="button" id="submitBtn" class="btn primary-btn">ログイン</button>
        <button type="button" id="toggleBtn" class="btn secondary-btn">新規アカウント作成はこちら</button>
        
        <div id="errorMsg" class="error"></div>
    </div>

    <!-- 2. ログイン後のマイページ -->
    <div id="mainSection" class="container hidden">
        <h2 style="text-align: center;">ようこそ！</h2>
        <p style="text-align: center;">ログイン中のアカウント: <br><strong id="userEmail"></strong></p>
        <button type="button" id="logoutBtn" class="btn danger-btn">ログアウト</button>
    </div>

    <script>
        // 【重要】あなたのGASのWebアプリURLをここに貼り付けてください
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzSMkPMAgAxFGeDd7f_rjr2SWUrquxWzbP6ICfpzUdvQZf6imaN0jo7hRzsujyjUxrtQA/exec"; 

        // 状態管理変数 ("login", "register", "verify")
        let currentMode = "login";

        // 自動ログイン確認（Cookieの代替）
        window.onload = function() {
            const token = localStorage.getItem("auth_token");
            const email = localStorage.getItem("auth_email");
            if (token && email) {
                document.getElementById("authSection").classList.add("hidden");
                document.getElementById("mainSection").classList.remove("hidden");
                document.getElementById("userEmail").textContent = email;
            }
        };

        // 「新規アカウント作成はこちら」ボタンが押されたときの処理
        document.getElementById("toggleBtn").onclick = function() {
            document.getElementById("errorMsg").textContent = "";
            if (typeof grecaptcha !== 'undefined') {
                grecaptcha.reset();
            }

            if (currentMode === "login") {
                currentMode = "register";
                document.getElementById("formTitle").textContent = "新規登録";
                document.getElementById("submitBtn").textContent = "次へ（確認メール送信）";
                document.getElementById("toggleBtn").textContent = "すでにアカウントをお持ちの方";
                
                document.getElementById("captchaContainer").classList.remove("hidden");
                document.getElementById("passwordGroup").classList.remove("hidden");
                document.getElementById("codeGroup").classList.add("hidden");
            } else {
                currentMode = "login";
                document.getElementById("formTitle").textContent = "ログイン";
                document.getElementById("submitBtn").textContent = "ログイン";
                document.getElementById("toggleBtn").textContent = "新規アカウント作成はこちら";
                
                document.getElementById("captchaContainer").classList.add("hidden");
                document.getElementById("passwordGroup").classList.remove("hidden");
                document.getElementById("codeGroup").classList.add("hidden");
            }
        };

        // 「ログイン」または「次へ」の決定ボタンが押されたときの処理
        document.getElementById("submitBtn").onclick = async function() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const errorMsg = document.getElementById("errorMsg");
            errorMsg.textContent = "通信中...";

            if (!email || (!password && currentMode !== "verify")) {
                errorMsg.textContent = "入力項目が不足しています";
                return;
            }

            try {
                let payload = { email: email };

                // A. 新規登録処理
                if (currentMode === "register") {
                    const token = grecaptcha.getResponse();
                    if (!token) {
                        errorMsg.textContent = "「私はロボットではありません」にチェックを入れてください。";
                        return;
                    }
                    payload.action = "register";
                    payload.password = password;
                    payload.recaptchaToken = token;

                    const res = await callGAS(payload);
                    if (res.status === "success") {
                        currentMode = "verify";
                        document.getElementById("formTitle").textContent = "コード確認";
                        document.getElementById("submitBtn").textContent = "アカウントを有効化";
                        document.getElementById("toggleBtn").classList.add("hidden"); // 誤操作防止
                        
                        document.getElementById("codeGroup").classList.remove("hidden");
                        document.getElementById("passwordGroup").classList.add("hidden");
                        document.getElementById("captchaContainer").classList.add("hidden");
                        errorMsg.textContent = "メールに送信されたコードを入力してください。";
                    } else {
                        errorMsg.textContent = res.message;
                        grecaptcha.reset();
                    }
                }
                // B. コード確認処理
                else if (currentMode === "verify") {
                    payload.action = "verify_code";
                    payload.code = document.getElementById("verifyCode").value;

                    const res = await callGAS(payload);
                    if (res.status === "success") {
                        alert("登録が完了しました！ログインしてください。");
                        location.reload();
                    } else {
                        errorMsg.textContent = res.message;
                    }
                }
                // C. ログイン処理
                else if (currentMode === "login") {
                    payload.action = "login";
                    payload.password = password;

                    const res = await callGAS(payload);
                    if (res.status === "success") {
                        localStorage.setItem("auth_token", res.token);
                        localStorage.setItem("auth_email", res.email);
                        location.reload();
                    } else {
                        errorMsg.textContent = res.message;
                    }
                }
            } catch (err) {
                errorMsg.textContent = "エラーが発生しました。設定を確認してください。";
                console.error(err);
            }
        };

        // GASへの通信共通関数
        async function callGAS(payload) {
            const response = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            });
            return await response.json();
        }

        // ログアウトボタンの処理
        document.getElementById("logoutBtn").onclick = function() {
            localStorage.removeItem("auth_token");
            localStorage.removeItem("auth_email");
            location.reload();
        };
    </script>
</body>
</html>
