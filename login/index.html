<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>セキュアログインサイト</title>
    <!-- reCAPTCHA v2 APIの読み込み -->
    <script src="https://google.com" async defer></script>
    <style>
        .container { max-width: 350px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; font-family: sans-serif; box-sizing: border-box; }
        .hidden { display: none !important; }
        
        /* モード切り替え用のタブボタングループ */
        .tab-group { display: flex; margin-bottom: 20px; border-bottom: 2px solid #ccc; }
        .tab-btn { flex: 1; padding: 10px; background: #f8f9fa; border: none; cursor: pointer; font-size: 14px; font-weight: bold; color: #6c757d; }
        .tab-btn.active { background: #fff; border-bottom: 2px solid #007bff; color: #007bff; }
        
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; margin-bottom: 4px; font-weight: bold; }
        .input-group input { width: 100%; padding: 8px; box-sizing: border-box; }
        .captcha-group { margin: 15px 0; display: flex; justify-content: center; }
        
        /* アクション実行ボタン */
        .action-btn { display: block; width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 15px; }
        .action-btn:hover { background: #0056b3; }
        
        .error { color: red; font-size: 14px; margin-top: 10px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <!-- 1. 認証セクション -->
    <div id="authSection" class="container">
        
        <!-- 明示的な切り替えタブボタン -->
        <div class="tab-group" id="tabGroup">
            <button class="tab-btn active" id="tabLogin">ログイン</button>
            <button class="tab-btn" id="tabRegister">新規登録</button>
        </div>
        
        <h2 id="formTitle" style="text-align: center; margin-bottom: 20px; display: none;">ログイン</h2>
        
        <div class="input-group" id="emailGroup">
            <label>メールアドレス</label>
            <input type="email" id="email">
        </div>
        
        <div class="input-group" id="passwordGroup">
            <label>パスワード</label>
            <input type="password" id="password">
        </div>
        
        <div class="input-group hidden" id="codeGroup">
            <label>確認コード（メールに送信された6桁）</label>
            <input type="text" id="verifyCode">
        </div>

        <div class="captcha-group hidden" id="captchaContainer">
            <div class="g-recaptcha" data-sitekey="6Le7Cl4tAAAAABFdmoBnlM5doq_6TPkzDim6lYJI"></div>
        </div>

        <!-- 決定ボタン -->
        <button id="submitBtn" class="action-btn">ログイン</button>
        <div id="errorMsg" class="error"></div>
    </div>

    <!-- 2. ログイン後のマイページ -->
    <div id="mainSection" class="container hidden">
        <h2 style="text-align: center;">ようこそ！</h2>
        <p style="text-align: center;">ログイン中のアカウント: <br><strong id="userEmail"></strong></p>
        <button id="logoutBtn" class="action-btn" style="background:#dc3545;">ログアウト</button>
    </div>

    <script>
        // 【重要】ここにあなたのGASのWebアプリURLを貼り付けてください
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzSMkPMAgAxFGeDd7f_rjr2SWUrquxWzbP6ICfpzUdvQZf6imaN0jo7hRzsujyjUxrtQA/exec"; 

        let mode = "login";

        window.addEventListener("DOMContentLoaded", () => {
            const token = localStorage.getItem("auth_token");
            const email = localStorage.getItem("auth_email");
            if (token && email) {
                showMainPage(email);
            }
        });

        // タブボタン：ログインを選択したとき
        document.getElementById("tabLogin").addEventListener("click", () => {
            switchMode("login");
        });

        // タブボタン：新規登録を選択したとき
        document.getElementById("tabRegister").addEventListener("click", () => {
            switchMode("register");
        });

        // 表示モードを切り替える関数
        function switchMode(targetMode) {
            const errorMsg = document.getElementById("errorMsg");
            errorMsg.textContent = "";
            grecaptcha.reset();
            mode = targetMode;

            // タブの活動状態（CSS）を切り替え
            if (mode === "login") {
                document.getElementById("tabLogin").classList.add("active");
                document.getElementById("tabRegister").classList.remove("active");
                document.getElementById("tabGroup").classList.remove("hidden"); // タブを表示
                
                document.getElementById("submitBtn").textContent = "ログイン";
                document.getElementById("passwordGroup").classList.remove("hidden");
                document.getElementById("captchaContainer").classList.add("hidden");
                document.getElementById("codeGroup").classList.add("hidden");
            } 
            else if (mode === "register") {
                document.getElementById("tabLogin").classList.remove("active");
                document.getElementById("tabRegister").classList.add("active");
                document.getElementById("tabGroup").classList.remove("hidden");
                
                document.getElementById("submitBtn").textContent = "次へ（確認メール送信）";
                document.getElementById("passwordGroup").classList.remove("hidden");
                document.getElementById("captchaContainer").classList.remove("hidden");
                document.getElementById("codeGroup").classList.add("hidden");
            }
            else if (mode === "verify") {
                // コード確認時はタブでの誤操作を防ぐためタブを隠す
                document.getElementById("tabGroup").classList.add("hidden");
                
                document.getElementById("submitBtn").textContent = "アカウントを有効化";
                document.getElementById("codeGroup").classList.remove("hidden");
                document.getElementById("passwordGroup").classList.add("hidden");
                document.getElementById("captchaContainer").classList.add("hidden");
            }
        }

        // 送信ボタンの処理
        document.getElementById("submitBtn").addEventListener("click", async () => {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const errorMsg = document.getElementById("errorMsg");
            errorMsg.textContent = "通信中...";

            if (!email || (!password && mode !== "verify")) {
                errorMsg.textContent = "入力項目が不足しています";
                return;
            }

            try {
                let payload = { email: email };

                if (mode === "register") {
                    const token = grecaptcha.getResponse();
                    if (!token) {
                        errorMsg.textContent = "「私はロボットではありません」にチェックを入れてください。";
                        return;
                    }

                    payload.action = "register";
                    payload.password = password;
                    payload.recaptchaToken = token;

                    const res = await callGAS(payload);
                    if (res.status === "success") {
                        switchMode("verify");
                        errorMsg.textContent = "メールに送信されたコードを入力してください。";
                    } else {
                        errorMsg.textContent = res.message;
                        grecaptcha.reset();
                    }
                }
                else if (mode === "verify") {
                    payload.action = "verify_code";
                    payload.code = document.getElementById("verifyCode").value;

                    const res = await callGAS(payload);
                    if (res.status === "success") {
                        alert("登録が完了しました！ログインしてください。");
                        location.reload();
                    } else {
                        errorMsg.textContent = res.message;
                    }
                }
                else if (mode === "login") {
                    payload.action = "login";
                    payload.password = password;

                    const res = await callGAS(payload);
                    if (res.status === "success") {
                        localStorage.setItem("auth_token", res.token);
                        localStorage.setItem("auth_email", res.email);
                        showMainPage(res.email);
                    } else {
                        errorMsg.textContent = res.message;
                    }
                }

            } catch (err) {
                errorMsg.textContent = "エラーが発生しました。URLや設定を確認してください。";
                console.error(err);
            }
        });

        async function callGAS(payload) {
            const response = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            });
            return await response.json();
        }

        function showMainPage(email) {
            document.getElementById("authSection").classList.add("hidden");
            document.getElementById("mainSection").classList.remove("hidden");
            document.getElementById("userEmail").textContent = email;
        }

        document.getElementById("logoutBtn").addEventListener("click", () => {
            localStorage.removeItem("auth_token");
            localStorage.removeItem("auth_email");
            location.reload();
        });
    </script>
</body>
</html>
