<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>セキュアログインサイト</title>
    <!-- reCAPTCHA v2 APIの読み込み -->
    <script src="https://google.com" async defer></script>
    <style>
        .container { max-width: 350px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; font-family: sans-serif; }
        .hidden { display: none; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; margin-bottom: 4px; font-weight: bold; }
        .input-group input { width: 100%; padding: 8px; box-sizing: border-box; }
        .captcha-group { margin: 15px 0; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .toggle-link { text-align: center; margin-top: 15px; font-size: 14px; color: #007bff; cursor: pointer; }
        .error { color: red; font-size: 14px; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- 1. ログイン/新規登録フォーム -->
    <div id="authSection" class="container">
        <h2 id="formTitle">ログイン</h2>
        
        <!-- メールアドレス入力欄（常に表示） -->
        <div class="input-group" id="emailGroup">
            <label>メールアドレス</label>
            <input type="email" id="email">
        </div>
        
        <!-- パスワード入力欄（常に表示、コード確認時のみプログラムで隠す） -->
        <div class="input-group" id="passwordGroup">
            <label>パスワード</label>
            <input type="password" id="password">
        </div>
        
        <!-- 新規登録の確認コード入力欄（初期状態は隠す） -->
        <div class="input-group hidden" id="codeGroup">
            <label>確認コード（メールに送信された6桁）</label>
            <input type="text" id="verifyCode">
        </div>

        <!-- reCAPTCHA v2 チェックボックス（初期状態はログイン用なので隠す） -->
        <div class="captcha-group hidden" id="captchaContainer">
            <div class="g-recaptcha" data-sitekey="6Le7Cl4tAAAAABFdmoBnlM5doq_6TPkzDim6lYJI"></div>
        </div>

        <button id="submitBtn">ログイン</button>
        <div id="errorMsg" class="error"></div>
        <div id="toggleMode" class="toggle-link">新規アカウント作成はこちら</div>
    </div>

    <!-- 2. ログイン後のマイページ -->
    <div id="mainSection" class="container hidden">
        <h2>ようこそ！</h2>
        <p>ログイン中のアカウント: <span id="userEmail"></span></p>
        <button id="logoutBtn" style="background:#dc3545;">ログアウト</button>
    </div>

    <script>
        // 【重要】ここにあなたのGASのWebアプリURLを貼り付けてください
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzSMkPMAgAxFGeDd7f_rjr2SWUrquxWzbP6ICfpzUdvQZf6imaN0jo7hRzsujyjUxrtQA/exec"; 

        let mode = "login";

        window.addEventListener("DOMContentLoaded", () => {
            const token = localStorage.getItem("auth_token");
            const email = localStorage.getItem("auth_email");
            if (token && email) {
                showMainPage(email);
            }
        });

        // ログインと新規登録のモード切り替え処理
        document.getElementById("toggleMode").addEventListener("click", () => {
            const errorMsg = document.getElementById("errorMsg");
            errorMsg.textContent = "";
            grecaptcha.reset(); // reCAPTCHAをリセット

            if (mode === "login") {
                mode = "register";
                document.getElementById("formTitle").textContent = "新規登録";
                document.getElementById("submitBtn").textContent = "次へ（確認メール送信）";
                document.getElementById("toggleMode").textContent = "すでにアカウントをお持ちの方";
                
                // 新規登録に必要な入力欄とreCAPTCHAを表示する
                document.getElementById("passwordGroup").classList.remove("hidden");
                document.getElementById("captchaContainer").classList.remove("hidden");
                document.getElementById("codeGroup").classList.add("hidden");
            } else {
                mode = "login";
                document.getElementById("formTitle").textContent = "ログイン";
                document.getElementById("submitBtn").textContent = "ログイン";
                document.getElementById("toggleMode").textContent = "新規アカウント作成はこちら";
                
                // ログインに必要な状態に戻す
                document.getElementById("passwordGroup").classList.remove("hidden");
                document.getElementById("captchaContainer").classList.add("hidden");
                document.getElementById("codeGroup").classList.add("hidden");
            }
        });

        // 送信ボタンが押されたときの処理
        document.getElementById("submitBtn").addEventListener("click", async () => {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const errorMsg = document.getElementById("errorMsg");
            errorMsg.textContent = "通信中...";

            // コード確認モード以外では、メアドとパスワードが必須
            if (!email || (!password && mode !== "verify")) {
                errorMsg.textContent = "入力項目が不足しています";
                return;
            }

            try {
                let payload = { email: email };

                // A. 新規登録モード
                if (mode === "register") {
                    const token = grecaptcha.getResponse();
                    if (!token) {
                        errorMsg.textContent = "「私はロボットではありません」にチェックを入れてください。";
                        return;
                    }

                    payload.action = "register";
                    payload.password = password;
                    payload.recaptchaToken = token;

                    const res = await callGAS(payload);
                    if (res.status === "success") {
                        mode = "verify";
                        document.getElementById("formTitle").textContent = "コード確認";
                        // コード入力欄だけを表示し、他を隠す
                        document.getElementById("codeGroup").classList.remove("hidden");
                        document.getElementById("passwordGroup").classList.add("hidden");
                        document.getElementById("captchaContainer").classList.add("hidden");
                        document.getElementById("submitBtn").textContent = "アカウントを有効化";
                        errorMsg.textContent = "メールに送信されたコードを入力してください。";
                    } else {
                        errorMsg.textContent = res.message;
                        grecaptcha.reset();
                    }
                }
                // B. 確認コード照合モード
                else if (mode === "verify") {
                    payload.action = "verify_code";
                    payload.code = document.getElementById("verifyCode").value;

                    const res = await callGAS(payload);
                    if (res.status === "success") {
                        alert("登録が完了しました！ログインしてください。");
                        location.reload();
                    } else {
                        errorMsg.textContent = res.message;
                    }
                }
                // C. ログインモード
                else if (mode === "login") {
                    payload.action = "login";
                    payload.password = password;

                    const res = await callGAS(payload);
                    if (res.status === "success") {
                        localStorage.setItem("auth_token", res.token);
                        localStorage.setItem("auth_email", res.email);
                        showMainPage(res.email);
                    } else {
                        errorMsg.textContent = res.message;
                    }
                }

            } catch (err) {
                errorMsg.textContent = "エラーが発生しました。URLや設定を確認してください。";
                console.error(err);
            }
        });

        // GASへの非同期通信
        async function callGAS(payload) {
            const response = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            });
            return await response.json();
        }

        // 会員ページの表示切り替え
        function showMainPage(email) {
            document.getElementById("authSection").classList.add("hidden");
            document.getElementById("mainSection").classList.remove("hidden");
            document.getElementById("userEmail").textContent = email;
        }

        // ログアウト処理
        document.getElementById("logoutBtn").addEventListener("click", () => {
            localStorage.removeItem("auth_token");
            localStorage.removeItem("auth_email");
            location.reload();
        });
    </script>
</body>
</html>
