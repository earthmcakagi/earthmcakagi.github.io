<title>市長(Yukimal)の引退まで</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<a href="https://earthmcakagi.github.io">
  <img src="topimg.png" alt="topimg" style="display: block; margin: 0 auto; width: 300px; max-width: 100%; height: auto;">
</a>
<h1 style="text-align: center;">市長(Yukimal)の引退まで</h1>
<div id="countdown">
  <span id="days">0</span>日
  <span id="hours">0</span>時間
  <span id="minutes">0</span>分
  <span id="seconds">0</span>秒
</div>

<script>
  const targetDate = new Date("2026-12-31T23:59:59").getTime();

  function update() {
    const now = new Date().getTime();
    const diff = targetDate - now;

    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((diff % (1000 * 60)) / 1000);

    document.getElementById("days").innerText = d;
    document.getElementById("hours").innerText = h;
    document.getElementById("minutes").innerText = m;
    document.getElementById("seconds").innerText = s;
  }
  setInterval(update, 1000);
</script>
